# Fly.io config — stays always-on (no idle spin-down), good for true 24/7.
# Deploy:  fly launch --no-deploy   (accept this file)  then  fly deploy
app = "mexc-ema200-dashboard"      # change to a unique name if taken
primary_region = "iad"             # pick one near you: iad, lhr, fra, sin, syd, ...

[build]
  dockerfile = "Dockerfile"

[env]
  SCAN_EVERY = "15"

[http_service]
  internal_port = 8000             # server reads $PORT; Fly sets it to this
  force_https = true
  auto_stop_machines = false       # keep it running non-stop
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
